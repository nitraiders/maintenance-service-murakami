<!DOCTYPE html>
<!-- Deployment Timestamp: 2026-05-01T11:15:00 -->
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンテナンスサービス村上 - 管理画面</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; margin: 20px; }
        h2 { color: #333; margin-bottom: 20px; font-size: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #f0f2f5; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #003399; color: white; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #003399; color: white; border: none; padding: 12px; border-radius: 30px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #002266; }
        button:disabled { background: #ccc; }
        #login-section, #form-section { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .success-msg { color: #28a745; margin-top: 10px; font-weight: bold; display: none; }
        
        /* 投稿一覧のスタイル */
        .item-list { text-align: left; margin-top: 20px; }
        .list-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .item-info { flex-grow: 1; overflow: hidden; }
        .item-meta { font-size: 12px; color: #888; }
        .item-text { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .del-btn { background: #dc3545; padding: 5px 12px; font-size: 12px; width: auto; margin-top: 0; border-radius: 5px; }
        .del-btn:hover { background: #a71d2a; }
    </style>
</head>
<body>
<div class="card">
    <div id="login-section">
        <h2>管理者ログイン</h2>
        <input type="password" id="admin-pass" placeholder="パスワードを入力">
        <button onclick="checkPassword()">ログイン</button>
    </div>
    <div id="form-section">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('news')">ニュース投稿</button>
            <button class="tab-btn" onclick="switchTab('faq')">FAQ管理</button>
        </div>

        <!-- ニュース投稿タブ -->
        <div id="news-tab" class="tab-content active">
            <h2>新着情報の投稿</h2>
            <div class="form-group">
                <label>日付</label>
                <input type="date" id="post-date">
            </div>
            <div class="form-group">
                <label>カテゴリ</label>
                <select id="post-category"><option value="新着情報">新着情報</option><option value="作業実績">作業実績</option></select>
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea id="post-content" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>画像 (カメラ/フォルダ)</label>
                <input type="file" id="post-image" accept="image/*">
            </div>
            <button id="submit-btn" onclick="submitPost()">投稿する</button>
            <p class="success-msg" id="news-success">投稿完了！</p>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
            <h2>ニュース管理 (削除)</h2>
            <div id="news-list" class="item-list">
                <p style="color:#888; text-align:center;">読み込み中...</p>
            </div>
        </div>

        <!-- FAQ投稿タブ -->
        <div id="faq-tab" class="tab-content">
            <h2>FAQの追加</h2>
            <div class="form-group">
                <label>質問 (Q)</label>
                <input type="text" id="faq-question" placeholder="例: 見積もりは無料ですか？">
            </div>
            <div class="form-group">
                <label>回答 (A)</label>
                <textarea id="faq-answer" rows="4" placeholder="例: はい、無料です。"></textarea>
            </div>
            <button id="faq-submit-btn" onclick="submitFaq()">FAQを追加する</button>
            <p class="success-msg" id="faq-success">追加完了！</p>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
            <h2>FAQ管理 (削除)</h2>
            <div id="faq-list" class="item-list">
                <p style="color:#888; text-align:center;">読み込み中...</p>
            </div>
        </div>
        
        <p style="margin-top: 30px;"><a href="#" onclick="location.reload()" style="color:#888; font-size:14px; text-decoration:none;">ログアウト</a></p>
    </div>
</div>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwHTM0IBJZBHjaPh50R6_4T9rAZhcAnToWTTDr_oiLR292b7ZaReWWQ5FSjMTHkI0dr/exec';
    const CORRECT_PASS = 'msm2724';

    function checkPassword() {
        if (document.getElementById('admin-pass').value === CORRECT_PASS) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
            document.getElementById('post-date').valueAsDate = new Date();
            loadPosts(); 
            loadFaqs();
        } else { alert('パスワードが違います'); }
    }
    document.getElementById('login-section').style.display = 'block';

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if (tab === 'news') {
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            document.getElementById('news-tab').classList.add('active');
        } else {
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('faq-tab').classList.add('active');
        }
    }

    let postsData = [];
    let faqsData = [];

    async function loadPosts() {
        const listDiv = document.getElementById('news-list');
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            postsData = data.news || [];
            listDiv.innerHTML = '';
            if (postsData.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#888;">投稿はありません</p>';
                return;
            }
            postsData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-meta">${item.date} [${item.category}]</div>
                        <div class="item-text">${item.content}</div>
                    </div>
                    <button class="del-btn" onclick="deletePostByIndex(${index})">削除</button>
                `;
                listDiv.appendChild(div);
            });
        } catch (e) {
            listDiv.innerHTML = '<p style="color:red; text-align:center;">一覧の取得に失敗しました</p>';
        }
    }

    async function loadFaqs() {
        const listDiv = document.getElementById('faq-list');
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            faqsData = data.faq || [];
            listDiv.innerHTML = '';
            if (faqsData.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#888;">FAQはありません</p>';
                return;
            }
            faqsData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-text">Q: ${item.question}</div>
                        <div class="item-meta">A: ${item.answer}</div>
                    </div>
                    <button class="del-btn" onclick="deleteFaqByIndex(${index})">削除</button>
                `;
                listDiv.appendChild(div);
            });
        } catch (e) {
            listDiv.innerHTML = '<p style="color:red; text-align:center;">一覧の取得に失敗しました</p>';
        }
    }

    async function deletePostByIndex(index) {
        const item = postsData[index];
        if (!item || !confirm('この投稿を削除しますか？')) return;
        const formattedDate = item.date.replace(/\//g, '-');
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'delete_news', password: CORRECT_PASS, id: item.id, content: item.content, date: formattedDate })
            });
            alert('削除リクエストを送信しました');
            setTimeout(loadPosts, 2000);
        } catch (e) { alert('エラーが発生しました'); }
    }

    async function deleteFaqByIndex(index) {
        const item = faqsData[index];
        if (!item || !confirm('このFAQを削除しますか？')) return;
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'delete_faq', password: CORRECT_PASS, id: item.id })
            });
            alert('削除リクエストを送信しました');
            setTimeout(loadFaqs, 2000);
        } catch (e) { alert('エラーが発生しました'); }
    }

    async function submitPost() {
        const btn = document.getElementById('submit-btn');
        const fileInput = document.getElementById('post-image');
        const content = document.getElementById('post-content').value;
        if (!content) return alert('内容を入力してください');
        btn.disabled = true; btn.innerText = '送信中...';
        let base64Image = "";
        if (fileInput.files.length > 0) { base64Image = await resizeAndConvert(fileInput.files[0]); }
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'post_news', password: CORRECT_PASS, date: document.getElementById('post-date').value, category: document.getElementById('post-category').value, content: content, image: base64Image })
            });
            document.getElementById('news-success').style.display = 'block';
            document.getElementById('post-content').value = ''; fileInput.value = '';
            setTimeout(() => { document.getElementById('news-success').style.display = 'none'; }, 5000);
            loadPosts();
        } catch (e) { alert('エラーが発生しました'); } finally { btn.disabled = false; btn.innerText = '投稿する'; }
    }

    async function submitFaq() {
        const btn = document.getElementById('faq-submit-btn');
        const question = document.getElementById('faq-question').value;
        const answer = document.getElementById('faq-answer').value;
        if (!question || !answer) return alert('質問と回答の両方を入力してください');
        btn.disabled = true; btn.innerText = '送信中...';
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'post_faq', password: CORRECT_PASS, question: question, answer: answer })
            });
            document.getElementById('faq-success').style.display = 'block';
            document.getElementById('faq-question').value = '';
            document.getElementById('faq-answer').value = '';
            setTimeout(() => { document.getElementById('faq-success').style.display = 'none'; }, 5000);
            loadFaqs();
        } catch (e) { alert('エラーが発生しました'); } finally { btn.disabled = false; btn.innerText = 'FAQを追加する'; }
    }

    function resizeAndConvert(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
