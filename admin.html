<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者パネル | メンテナンスサービス 村上</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="assets/images/maintenance-service-murakami_rogo.png">
    
    <style>
        :root {
            --primary: #003399;
            --accent: #ffcc00;
            --text-main: #1d1d1f;
            --text-sub: #424245;
            --bg-white: #ffffff;
            --bg-light: #f5f5f7;
            --error: #ff3b30;
            --success: #34c759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-light);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 95%;
            max-width: 500px;
            background: var(--bg-white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            text-decoration: none;
        }
        .logo img { height: 40px; }
        .logo span { font-size: 1.2rem; font-weight: 900; color: #006400; }

        h1 {
            font-size: 1.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
        }

        /* ログイン画面 */
        #auth-section {
            display: block;
        }
        #admin-section {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-sub);
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e1e1e1;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            height: 56px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #auth-error {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .success-msg {
            background: #e8f5e9;
            color: var(--success);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-sub);
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="logo">
            <img src="assets/images/maintenance-service-murakami_rogo.png" alt="アイコン">
            <span>メンテナンスサービス村上</span>
        </a>

        <!-- 認証セクション -->
        <div id="auth-section">
            <h1>管理者認証</h1>
            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" placeholder="パスワードを入力してください">
                <p id="auth-error">パスワードが正しくありません。</p>
            </div>
            <button id="login-btn" class="btn">ログイン</button>
            <a href="index.html" class="back-link">サイトに戻る</a>
        </div>

        <!-- 投稿フォームセクション -->
        <div id="admin-section">
            <h1>新着情報の投稿</h1>
            
            <div id="success-banner" class="success-msg">
                <i class="fas fa-check-circle"></i> 投稿が完了しました！
            </div>

            <form id="post-form">
                <div class="form-group">
                    <label for="date">日付</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="category">カテゴリ</label>
                    <select id="category" name="category" required>
                        <option value="新着情報">新着情報</option>
                        <option value="作業実績">作業実績</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="content">内容</label>
                    <textarea id="content" name="content" rows="5" placeholder="投稿内容を入力してください" required></textarea>
                </div>

                <div class="form-group">
                    <label for="image">画像URL（任意）</label>
                    <input type="url" id="image" name="image" placeholder="https://example.com/image.jpg">
                </div>

                <button type="submit" id="submit-btn" class="btn">
                    <i class="fas fa-paper-plane"></i> 投稿する
                </button>
            </form>
            <button id="logout-btn" class="back-link" style="background:none; border:none; width:100%; cursor:pointer;">ログアウト</button>
        </div>
    </div>

    <script>
        // 設定
        const ADMIN_PASSWORD = "msm2724"; // 管理用パスワード
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwHTM0IBJZBHjaPh50R6_4T9rAZhcAnToWTTDr_oiLR292b7ZaReWWQ5FSjMTHkI0dr/exec";

        // 要素の取得
        const authSection = document.getElementById('auth-section');
        const adminSection = document.getElementById('admin-section');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const authError = document.getElementById('auth-error');
        
        const postForm = document.getElementById('post-form');
        const submitBtn = document.getElementById('submit-btn');
        const successBanner = document.getElementById('success-banner');
        const logoutBtn = document.getElementById('logout-btn');

        // 今日の日付を初期値に設定
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = today;

        // --- 認証ロジック ---
        loginBtn.addEventListener('click', () => {
            if (passwordInput.value === ADMIN_PASSWORD) {
                // 認証成功
                authSection.style.display = 'none';
                adminSection.style.display = 'block';
                authError.style.display = 'none';
                passwordInput.value = '';
            } else {
                // 認証失敗
                authError.style.display = 'block';
            }
        });

        // Enterキーでもログインできるようにする
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // ログアウト
        logoutBtn.addEventListener('click', () => {
            adminSection.style.display = 'none';
            authSection.style.display = 'block';
        });

        // --- 投稿処理 ---
        postForm.onsubmit = async (e) => {
            e.preventDefault();
            
            // ボタンを無効化
            submitBtn.disabled = true;
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 送信中...';
            successBanner.style.display = 'none';

            // データの組み立て
            const formData = new FormData(postForm);
            const data = {
                action: 'post_news', // GAS側で処理を分けるためのフラグ（任意）
                date: formData.get('date'),
                category: formData.get('category'),
                content: formData.get('content'),
                image: formData.get('image')
            };

            try {
                // GASへPOST送信
                // GASがJSONを受け取れる設定になっている前提
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                // 送信成功（GAS側でno-cors等になっている場合はレスポンスが不透明な場合がありますが、基本的には成功とみなす）
                successBanner.style.display = 'block';
                postForm.reset();
                document.getElementById('date').value = today; // 日付を戻す
                
                // 3秒後にバナーを消す
                setTimeout(() => {
                    successBanner.style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error('Submission error:', error);
                alert('送信に失敗しました。ネットワーク状況を確認してください。');
            } finally {
                // ボタンを元に戻す
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
            }
        };
    </script>
</body>
</html>
